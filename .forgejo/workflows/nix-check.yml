name: Nix Flake Check

on:
  pull_request:

jobs:
  flake-check:
    runs-on: nixos
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail

          hosts="$(sed -n 's/^[[:space:]]*nixosConfigurations\.\([a-zA-Z0-9_-]\+\)[[:space:]]*=.*/\1/p' flake.nix)"

          echo "Checking nixosConfigurations one-by-one..."
          for host in $hosts; do
            # rescue reads the runner host's root-only SOPS key during evaluation;
            # keep that special-purpose host out of unprivileged CI checks.
            if [ "$host" = "rescue" ]; then
              echo " - $host (skipped: requires host SOPS key)"
              continue
            fi
            echo " - $host"
            nix --extra-experimental-features 'nix-command flakes' \
              eval ".#nixosConfigurations.${host}.config.system.build.toplevel.drvPath" \
              --impure --show-trace > /dev/null
          done
